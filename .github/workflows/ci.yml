name: CI

on:
  push:
    branches: [main, develop]

jobs:
  # ============================================
  # Backend: Build & Test
  # ============================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue-light-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('blue-light-backend/**/*.gradle*', 'blue-light-backend/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        run: ./gradlew build --no-daemon -x test

  # ============================================
  # Frontend: Build & Lint
  # ============================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue-light-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blue-light-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

  # ============================================
  # AI Service: Test
  # ============================================
  ai-test:
    name: AI Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue-light-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('blue-light-ai/requirements.txt', 'blue-light-ai/requirements-dev.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests (excluding vision and snapshots)
        run: pytest tests/ -m "not vision and not snapshot" --timeout=60 -x -q
