name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-7
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-7.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ============================================
  # Backend: Build & Test
  # ============================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue-light-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('blue-light-backend/**/*.gradle*', 'blue-light-backend/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        run: ./gradlew build --no-daemon -x test

  # ============================================
  # Frontend: Build & Lint
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue-light-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blue-light-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

  # ============================================
  # Docker Build & Push → ECR (ARM64)
  # ============================================
  docker-push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/bluelight-backend:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/bluelight-backend:stable \
            ./blue-light-backend
          docker push ${{ env.ECR_REGISTRY }}/bluelight-backend:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/bluelight-backend:stable

      - name: Build & Push Frontend image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/bluelight-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/bluelight-frontend:stable \
            --build-arg VITE_API_BASE_URL=/api \
            ./blue-light-frontend
          docker push ${{ env.ECR_REGISTRY }}/bluelight-frontend:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/bluelight-frontend:stable

      - name: Build & Push SLD Agent image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/bluelight-sld-agent:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/bluelight-sld-agent:stable \
            ./blue-light-ai
          docker push ${{ env.ECR_REGISTRY }}/bluelight-sld-agent:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/bluelight-sld-agent:stable

  # ============================================
  # Rolling Deploy to Production (2 instances)
  # ============================================
  deploy:
    name: Deploy (${{ matrix.server == 1 && 'Instance A' || 'Instance B' }})
    runs-on: ubuntu-latest
    needs: docker-push
    environment: production
    strategy:
      matrix:
        server: [1, 2]
      max-parallel: 1  # 순차 배포 — A 완료 후 B (무중단)

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ matrix.server == 1 && secrets.PROD_SERVER_HOST_1 || secrets.PROD_SERVER_HOST_2 }} >> ~/.ssh/known_hosts 2>/dev/null
          # Debug: key file info (no content exposed)
          echo "Key file: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
          head -1 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || echo "Key validation failed"

      - name: Copy docker-compose and deploy
        env:
          HOST: ${{ matrix.server == 1 && secrets.PROD_SERVER_HOST_1 || secrets.PROD_SERVER_HOST_2 }}
          USER: ${{ secrets.PROD_SERVER_USER }}
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
        run: |
          # docker-compose.yml 전송
          scp $SSH_OPTS docker-compose.yml ${USER}@${HOST}:/home/${USER}/bluelight/

          # .env 파일 생성 + 배포
          ssh $SSH_OPTS ${USER}@${HOST} bash -s << 'DEPLOY_SCRIPT'
          cd /home/${{ secrets.PROD_SERVER_USER }}/bluelight

          # ECR 로그인
          aws ecr get-login-password --region ap-southeast-7 | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # 환경변수 설정
          cat > .env << 'ENVEOF'
          DOCKER_REGISTRY=${{ env.ECR_REGISTRY }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          FILE_STORAGE_TYPE=s3
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_REGION=ap-southeast-7
          SLD_AGENT_SERVICE_KEY=${{ secrets.SLD_AGENT_SERVICE_KEY }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_SMTP_ENABLED=true
          PASSWORD_RESET_BASE_URL=${{ secrets.PASSWORD_RESET_BASE_URL }}
          SQL_INIT_MODE=never
          ENVEOF

          # MySQL 접속 정보 추출 (SLD Agent용)
          DB_URL_RAW=$(grep '^DB_URL=' .env | sed 's/^DB_URL=//')
          MYSQL_HOST=$(echo "$DB_URL_RAW" | sed 's|jdbc:mysql://||' | cut -d: -f1)
          MYSQL_PORT=$(echo "$DB_URL_RAW" | sed 's|jdbc:mysql://||' | cut -d: -f2 | cut -d/ -f1)
          MYSQL_DB=$(echo "$DB_URL_RAW" | sed 's|jdbc:mysql://||' | cut -d/ -f2 | cut -d? -f1)
          echo "MYSQL_HOST=$MYSQL_HOST" >> .env
          echo "MYSQL_PORT=$MYSQL_PORT" >> .env
          echo "MYSQL_DATABASE=$MYSQL_DB" >> .env

          # 배포
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          DEPLOY_SCRIPT

      - name: Wait for health check
        run: |
          HOST=${{ matrix.server == 1 && secrets.PROD_SERVER_HOST_1 || secrets.PROD_SERVER_HOST_2 }}
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://$HOST/health 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Instance healthy"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i/30 (status: $STATUS)"
            sleep 10
          done
          echo "❌ Health check failed after 300s"
          exit 1
