<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    LicenseKaki — Favicon (16-32px optimized)
    Simplified shield + bold checkmark
  -->

  <!-- Shield shape — simplified -->
  <path d="M 16,1 L 30,5 L 30,18 C 30,26 24,30 16,32 C 8,30 2,26 2,18 L 2,5 Z"
        fill="#1A2744"/>

  <!-- Simplified circuit lines (just two) -->
  <line x1="8" y1="14" x2="18" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="14" x2="12" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Circuit dots -->
  <circle cx="8" cy="14" r="1.8" fill="white"/>
  <circle cx="12" cy="14" r="1.8" fill="#E8313A"/>

  <!-- Bold checkmark -->
  <path d="M 18,14 L 23,20 L 30,6"
        stroke="#E8313A" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
