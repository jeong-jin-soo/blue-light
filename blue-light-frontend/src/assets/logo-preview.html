<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LicenseKaki — Complete Brand System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Poppins', sans-serif; background: #e2e6ea; color: #1C2B4A; }
  .hero { background: #0B1120; padding: 32px; text-align: center; border-bottom: 3px solid #E8313A; }
  .hero h1 { font-size: 9px; font-weight: 600; color: #475569; letter-spacing: 8px; text-transform: uppercase; }
  .hero h2 { font-size: 22px; font-weight: 800; color: white; margin-top: 4px; }
  .hero h2 span { color: #E8313A; }
  .section { padding: 28px 32px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .label { font-size: 9px; text-transform: uppercase; letter-spacing: 5px; color: #94A3B8; font-weight: 600; }
  .dark { background: #0f172a; }
  .dark .label { color: #475569; }
  .card { background: white; border-radius: 12px; padding: 24px 36px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: inline-block; border: 1px solid #c0c8d4; }
  .card-dark { background: #1e293b; border-radius: 12px; padding: 24px 36px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: inline-block; }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .size-label { font-size: 8px; color: #94a3b8; font-weight: 500; }
  hr { border: none; border-top: 1px solid #cbd5e1; width: 50%; max-width: 400px; margin: 0 auto; }
  img { display: block; }
</style>
</head>
<body>

<div class="hero">
  <h1>LICENSEKAKI</h1>
  <h2>Complete Brand <span>System</span></h2>
</div>

<!-- Main Logo Light -->
<div class="section">
  <div class="label">1 &middot; MAIN LOGO — LIGHT</div>
  <div class="card"><img src="logo-licensekaki.png" height="90"></div>
</div>

<!-- Main Logo Dark -->
<div class="section dark">
  <div class="label">MAIN LOGO — DARK</div>
  <div class="card-dark"><img src="logo-licensekaki-dark.png" height="90"></div>
</div>

<!-- Variants Row -->
<div class="section" style="background:#d5dbe3;">
  <div class="label">ICON VARIANTS</div>
  <div class="row">
    <div class="col">
      <div class="card" style="padding:12px;"><img src="logo-icon.png" height="72"></div>
      <div class="size-label">LK Monogram</div>
    </div>
    <div class="col">
      <div class="card" style="padding:12px;"><img src="logo-shield.png" height="72"></div>
      <div class="size-label">Shield Icon</div>
    </div>
    <div class="col">
      <div class="card" style="padding:12px;"><img src="logo-wordmark.png" height="52"></div>
      <div class="size-label">Wordmark</div>
    </div>
    <div class="col">
      <div class="card" style="padding:8px;"><img src="../../public/favicon.png" width="32" height="32"></div>
      <div class="size-label">Favicon</div>
    </div>
  </div>
</div>

<hr>

<!-- Sub-brands -->
<div class="section">
  <div class="label">2 &middot; AI SLD</div>
  <div class="card"><img src="logo-ai-sld.png" height="90"></div>
</div>

<hr>

<div class="section">
  <div class="label">3 &middot; AI PV SLD</div>
  <div class="card"><img src="logo-ai-pv-sld.png" height="90"></div>
</div>

<hr>

<div class="section">
  <div class="label">4 &middot; HANGREEN</div>
  <div class="card"><img src="logo-hanvision-green.png" height="90"></div>
</div>

</body>
</html>
